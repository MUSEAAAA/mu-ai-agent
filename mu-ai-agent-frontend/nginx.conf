server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    location ^~ /api/ {
        proxy_pass https://mu-ai-agent-bankend-270378-8-1443313333.sh.run.tcloudbase.com/api/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name mu-ai-agent-bankend-270378-8-1443313333.sh.run.tcloudbase.com;

        proxy_set_header Host mu-ai-agent-bankend-270378-8-1443313333.sh.run.tcloudbase.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_intercept_errors off;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
